<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BP Protocol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f5f3ef;
        --surface: #ffffff;
        --border: #e2ded8;
        --border-focus: #1a1a1a;
        --text-primary: #1a1a1a;
        --text-secondary: #6b6560;
        --text-muted: #9e9993;
        --accent: #1a1a1a;
        --accent-soft: #f0ede8;
        --red: #c0392b;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
        --radius: 14px;
        --radius-sm: 8px;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        font-family: "DM Sans", sans-serif;
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }

      /* Page load animation */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-md);
        width: 100%;
        max-width: 480px;
        padding: 40px 40px 36px;
        animation: fadeUp 0.5s ease both;
        padding: 20px;
      }

      /* Header */
      .header {
        margin-bottom: 32px;
        animation: fadeUp 0.5s 0.05s ease both;
      }

      .header-eyebrow {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      .header-eyebrow::before {
        content: "";
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #27ae60;
        box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.2);
      }

      .header h1 {
        font-family: "DM Serif Display", serif;
        font-size: 28px;
        font-weight: 400;
        letter-spacing: -0.3px;
        line-height: 1.2;
        color: var(--text-primary);
      }

      .header p {
        margin-top: 6px;
        font-size: 14px;
        color: var(--text-secondary);
        line-height: 1.5;
        font-weight: 300;
      }

      /* BP Source Toggle */
      .source-toggle {
        display: flex;
        gap: 8px;
        margin-bottom: 28px;
        animation: fadeUp 0.5s 0.1s ease both;
      }

      .source-btn {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 12px 10px;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        background: transparent;
        cursor: pointer;
        transition: all 0.18s ease;
        font-family: "DM Sans", sans-serif;
        text-align: center;
      }

      .source-btn:hover {
        border-color: #c8c4be;
        background: var(--accent-soft);
      }

      .source-btn.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .source-btn .btn-icon {
        font-size: 18px;
        line-height: 1;
      }

      .source-btn .btn-label {
        font-size: 13px;
        font-weight: 600;
        color: inherit;
        line-height: 1;
      }

      .source-btn .btn-sub {
        font-size: 11px;
        font-weight: 400;
        color: var(--text-muted);
        line-height: 1;
      }

      .source-btn.active .btn-sub {
        color: rgba(255, 255, 255, 0.65);
      }

      /* Divider */
      .section-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 12px;
        animation: fadeUp 0.5s 0.15s ease both;
      }

      /* BP Inputs */
      .bp-inputs {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 0;
        margin-bottom: 28px;
        animation: fadeUp 0.5s 0.2s ease both;
      }

      .bp-field {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .bp-input-wrap {
        position: relative;
      }

      .bp-input {
        width: 100%;
        background: var(--accent-soft);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        font-family: "DM Serif Display", serif;
        font-size: 48px;
        font-weight: 400;
        color: var(--text-primary);
        text-align: center;
        padding: 20px 12px 14px;
        outline: none;
        transition:
          border-color 0.18s,
          box-shadow 0.18s,
          background 0.18s;
        line-height: 1;
        -moz-appearance: textfield;
      }

      .bp-input::-webkit-inner-spin-button,
      .bp-input::-webkit-outer-spin-button {
        -webkit-appearance: none;
      }

      .bp-input:focus {
        border-color: var(--border-focus);
        background: #fff;
        box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.08);
      }

      .bp-input.error {
        border-color: var(--red);
        box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.1);
      }

      .bp-input-label {
        margin-top: 8px;
        text-align: center;
      }

      .bp-input-label .label-main {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
      }

      .bp-input-label .label-sub {
        display: block;
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 2px;
        font-weight: 400;
      }

      .bp-separator {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 10px;
        padding-bottom: 36px;
      }

      .bp-separator span {
        font-family: "DM Serif Display", serif;
        font-size: 36px;
        color: var(--text-muted);
        line-height: 1;
        user-select: none;
      }

      /* Unit badge */
      .unit-badge {
        display: flex;
        justify-content: center;
        margin-bottom: 24px;
        animation: fadeUp 0.5s 0.22s ease both;
      }

      .unit-badge span {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        background: var(--accent-soft);
        border: 1px solid var(--border);
        padding: 3px 10px;
        border-radius: 20px;
      }

      /* Submit */
      .submit-btn {
        width: 100%;
        padding: 16px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius-sm);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.01em;
        transition:
          opacity 0.15s,
          transform 0.12s;
        animation: fadeUp 0.5s 0.25s ease both;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .submit-btn:hover {
        opacity: 0.88;
      }
      .submit-btn:active {
        transform: scale(0.98);
      }

      /* Keyboard hint */
      .kbd-hint {
        margin-top: 14px;
        text-align: center;
        font-size: 12px;
        color: var(--text-muted);
        animation: fadeUp 0.5s 0.3s ease both;
      }

      .kbd-hint kbd {
        display: inline-block;
        background: var(--accent-soft);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 1px 5px;
        font-family: "DM Sans", sans-serif;
        font-size: 11px;
        color: var(--text-secondary);
      }

      /* ── Result Panel ───────────────────────────────── */
      .result-panel {
        display: none;
        margin-top: 20px;
        animation: fadeUp 0.35s ease both;
      }
      .result-panel.visible {
        display: block;
      }

      /* Status banner */
      .result-banner {
        border-radius: var(--radius-sm);
        padding: 16px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 12px;
        border: 1.5px solid transparent;
      }
      .result-banner-icon {
        font-size: 22px;
        line-height: 1;
        flex-shrink: 0;
      }
      .result-banner-text {
      }
      .result-banner-title {
        font-family: "DM Serif Display", serif;
        font-size: 17px;
        font-weight: 400;
        line-height: 1.2;
      }
      .result-banner-sub {
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        opacity: 0.55;
        margin-top: 3px;
      }

      /* Action cards */
      .action-cards {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .action-card {
        border-radius: var(--radius-sm);
        border: 1.5px solid var(--border);
        background: #fff;
        overflow: hidden;
      }
      .action-card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
      }
      .action-card-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .action-card-label {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--text-muted);
      }
      .action-card-badge {
        margin-left: auto;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 20px;
      }
      .action-card-body {
        padding: 0 16px 14px;
        font-size: 13.5px;
        line-height: 1.65;
        color: var(--text-secondary);
        font-weight: 300;
        border-top: 1px solid var(--border);
        padding-top: 12px;
      }

      /* Theme: crisis (red) */
      .theme-crisis .result-banner {
        background: #fff0f0;
        border-color: #e8a09d;
      }
      .theme-crisis .action-card-dot {
        background: #d9534f;
      }
      .theme-crisis .action-card-badge {
        background: #fdecea;
        color: #c0392b;
      }

      /* Theme: low (blue) */
      .theme-low .result-banner {
        background: #eef4ff;
        border-color: #8eb4f5;
      }
      .theme-low .action-card-dot {
        background: #3b82f6;
      }
      .theme-low .action-card-badge {
        background: #dbeafe;
        color: #1d4ed8;
      }

      /* Theme: oncall (orange) */
      .theme-oncall .result-banner {
        background: #fff4ed;
        border-color: #f4b98a;
      }
      .theme-oncall .action-card-dot {
        background: #e8721a;
      }
      .theme-oncall .action-card-badge {
        background: #fee9d7;
        color: #c05621;
      }

      /* Theme: monitor (amber) */
      .theme-monitor .result-banner {
        background: #fffbec;
        border-color: #f5d97a;
      }
      .theme-monitor .action-card-dot {
        background: #d4a017;
      }
      .theme-monitor .action-card-badge {
        background: #fef3c7;
        color: #92400e;
      }

      /* Theme: normal (green) */
      .theme-normal .result-banner {
        background: #f0faf4;
        border-color: #a8d9b8;
      }
      .theme-normal .action-card-dot {
        background: #27ae60;
      }
      .theme-normal .action-card-badge {
        background: #d1fae5;
        color: #065f46;
      }

      /* Error shake */
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-5px);
        }
        40% {
          transform: translateX(5px);
        }
        60% {
          transform: translateX(-4px);
        }
        80% {
          transform: translateX(4px);
        }
      }
      .shake {
        animation: shake 0.35s ease;
      }

      /* Responsive */
      @media (max-width: 480px) {
        .card {
          padding: 28px 20px 24px;
        }
        .bp-input {
          font-size: 40px;
          padding: 16px 8px 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- Header -->
      <div class="header">
        <div class="header-eyebrow">Blood Pressure Protocol</div>
        <h1>Check Your Reading</h1>
        <p>Enter your blood pressure values below to receive personalised guidance.</p>
      </div>

      <!-- Source Toggle -->
      <div class="source-toggle" role="radiogroup" aria-label="Measurement context">
        <button class="source-btn active" id="btn-clinic" data-value="clinic" onclick="setSource('clinic')" type="button" aria-pressed="true">
          <span class="btn-icon">🏥</span>
          <span class="btn-label">Clinic BP</span>
          <span class="btn-sub">Measured by a professional</span>
        </button>
        <button class="source-btn" id="btn-home" data-value="home" onclick="setSource('home')" type="button" aria-pressed="false">
          <span class="btn-icon">🏠</span>
          <span class="btn-label">Home BP</span>
          <span class="btn-sub">Self-measured at home</span>
        </button>
      </div>

      <!-- BP Input -->
      <div class="section-label">Blood Pressure (mmHg)</div>

      <div class="bp-inputs">
        <div class="bp-field">
          <div class="bp-input-wrap">
            <input class="bp-input" id="systolic" type="number" inputmode="numeric" min="60" max="250" maxlength="3" placeholder="120" aria-label="Systolic pressure" autocomplete="off" />
          </div>
          <div class="bp-input-label">
            <span class="label-main">Systolic</span>
            <span class="label-sub">Top number</span>
          </div>
        </div>

        <div class="bp-separator">
          <span>/</span>
        </div>

        <div class="bp-field">
          <div class="bp-input-wrap">
            <input class="bp-input" id="diastolic" type="number" inputmode="numeric" min="40" max="150" maxlength="3" placeholder="80" aria-label="Diastolic pressure" autocomplete="off" />
          </div>
          <div class="bp-input-label">
            <span class="label-main">Diastolic</span>
            <span class="label-sub">Bottom number</span>
          </div>
        </div>
      </div>

      <div class="unit-badge"><span>mmHg · millimetres of mercury</span></div>

      <button class="submit-btn" id="submit-btn" onclick="handleSubmit()" type="button">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        Analyse Reading
      </button>

      <div class="kbd-hint"><kbd>Space</kbd> or <kbd>Enter</kbd> to navigate · <kbd>Enter</kbd> to submit when both are filled</div>

      <!-- Result Panel (hidden until submit) -->
      <div class="result-panel" id="result-panel" role="alert" aria-live="polite">
        <!-- filled dynamically -->
      </div>
    </div>

    <script>
      const systolicEl = document.getElementById("systolic");
      const diastolicEl = document.getElementById("diastolic");
      const resultPanel = document.getElementById("result-panel");

      let source = "clinic";

      // Auto-focus systolic on load
      window.addEventListener("DOMContentLoaded", () => systolicEl.focus());

      // Source toggle
      function setSource(val) {
        source = val;
        document.querySelectorAll(".source-btn").forEach((b) => {
          const active = b.dataset.value === val;
          b.classList.toggle("active", active);
          b.setAttribute("aria-pressed", active);
        });
        clearResult();
      }

      // Auto-advance after 3 digits on systolic
      systolicEl.addEventListener("input", () => {
        const v = systolicEl.value.replace(/\D/g, "");
        if (v.length > 3) systolicEl.value = v.slice(0, 3);
        if (systolicEl.value.length === 3) diastolicEl.focus();
        clearResult();
      });

      diastolicEl.addEventListener("input", () => {
        const v = diastolicEl.value.replace(/\D/g, "");
        if (v.length > 3) diastolicEl.value = v.slice(0, 3);
        clearResult();
      });

      // Keyboard navigation
      systolicEl.addEventListener("keydown", (e) => {
        if (e.key === " ") {
          e.preventDefault();
          diastolicEl.focus();
        }
        if (e.key === "Enter") {
          e.preventDefault();
          if (!systolicEl.value.trim()) {
            shakeField(systolicEl);
            return;
          }
          if (!diastolicEl.value.trim()) {
            diastolicEl.focus();
            return;
          }
          handleSubmit();
        }
      });

      diastolicEl.addEventListener("keydown", (e) => {
        if (e.key === " ") {
          e.preventDefault();
          systolicEl.focus();
        }
        if (e.key === "Enter") {
          e.preventDefault();
          if (!diastolicEl.value.trim()) {
            shakeField(diastolicEl);
            return;
          }
          if (!systolicEl.value.trim()) {
            systolicEl.focus();
            return;
          }
          handleSubmit();
        }
      });

      function shakeField(el) {
        el.classList.add("error", "shake");
        el.focus();
        setTimeout(() => el.classList.remove("shake"), 400);
        setTimeout(() => el.classList.remove("error"), 1800);
      }

      function clearResult() {
        resultPanel.classList.remove("visible");
        resultPanel.className = "result-panel";
        systolicEl.classList.remove("error");
        diastolicEl.classList.remove("error");
      }

      function handleSubmit() {
        const sys = parseInt(systolicEl.value, 10);
        const dia = parseInt(diastolicEl.value, 10);

        if (!systolicEl.value.trim() && !diastolicEl.value.trim()) {
          shakeField(systolicEl);
          return;
        }
        if (!systolicEl.value.trim()) {
          shakeField(systolicEl);
          return;
        }
        if (!diastolicEl.value.trim()) {
          shakeField(diastolicEl);
          return;
        }

        showResult(sys, dia, source);
      }

      // ─── BP CLASSIFICATION ───────────────────────────────────────────
      //
      // Rules (worst of sys/dia wins; lower boundary → higher category):
      //
      // GLOBAL (before clinic/home split):
      //   sys >= 180 OR dia >= 120  → Crisis  (urgent oncall + screen message)
      //   sys < 90  OR dia < 60    → Hypo    (urgent oncall)
      //
      // CLINIC:
      //   sys < 140 AND dia < 90            → Normal
      //   sys 140–159 OR dia 90–99          → Home BP monitoring + Hypertension clinic waitlist
      //   sys 160–179 OR dia 100–119        → Task to on-call GP
      //
      // HOME:
      //   sys < 135 AND dia < 85            → Normal
      //   sys 135–149 OR dia 85–94          → Hypertension clinic waitlist
      //   sys 150–179 OR dia 95–119         → Task to on-call GP

      function classify(sys, dia, src) {
        // ── Crisis
        if (sys >= 180 || dia >= 120) {
          return {
            theme: "theme-crisis",
            icon: "🚨",
            title: "Hypertensive Crisis",
            subtitle: "Immediate Action Required",
            actions: [
              {
                label: "Urgent Task — On-Call GP",
                badge: "Urgent",
                body: `Raise an urgent task for the on-call GP immediately. Patient BP reading: ${sys}/${dia} mmHg. This exceeds the hypertensive crisis threshold (≥180/120 mmHg). Patient requires same-day clinical review and possible emergency referral.`,
              },
              {
                label: "Screen Message — On-Call",
                badge: "Send Now",
                body: `⚠️ URGENT BP ALERT\nPatient BP: ${sys}/${dia} mmHg\nThreshold exceeded: ≥180 systolic or ≥120 diastolic.\nPlease review immediately. Patient has been advised not to exert themselves and to remain seated. Awaiting on-call response.`,
              },
            ],
          };
        }

        // ── Hypotension
        if (sys < 90 || dia < 60) {
          return {
            theme: "theme-low",
            icon: "💧",
            title: "Low Blood Pressure",
            subtitle: "Hypotension Detected",
            actions: [
              {
                label: "Urgent Task — On-Call GP",
                badge: "Urgent",
                body: `Raise an urgent task for the on-call GP. Patient BP reading: ${sys}/${dia} mmHg — below the hypotension threshold (<90/60 mmHg). Patient should remain seated or lying down. Clinical review required to assess for symptoms such as dizziness, fainting, or collapse.`,
              },
            ],
          };
        }

        // ── Clinic BP
        if (src === "clinic") {
          // Normal: sys < 140 AND dia < 90
          if (sys < 140 && dia < 90) {
            return {
              theme: "theme-normal",
              icon: "✅",
              title: "Normal Blood Pressure",
              subtitle: "Clinic Reading · Within Range",
              actions: [
                {
                  label: "No Action Required",
                  badge: "Normal",
                  body: `Clinic BP of ${sys}/${dia} mmHg is within the normal range (<140/90 mmHg). Continue routine monitoring as clinically indicated. Advise the patient to maintain a healthy lifestyle — regular exercise, low-salt diet, and avoiding smoking.`,
                },
              ],
            };
          }

          // On-call task: sys >= 160 OR dia >= 100 (checked before monitoring band)
          if (sys >= 160 || dia >= 100) {
            return {
              theme: "theme-oncall",
              icon: "📋",
              title: "Significantly Elevated BP",
              subtitle: "Clinic Reading · GP Review Needed",
              actions: [
                {
                  label: "Task — On-Call GP",
                  badge: "Action Required",
                  body: `Raise a task for the on-call GP. Clinic BP reading: ${sys}/${dia} mmHg — meets the threshold for GP review (≥160/100 mmHg). Patient may require same-day assessment, medication review, or initiation of antihypertensive therapy.`,
                },
              ],
            };
          }

          // Monitoring band: sys 140–159 OR dia 90–99
          return {
            theme: "theme-monitor",
            icon: "📊",
            title: "Elevated Clinic BP",
            subtitle: "Clinic Reading · 140–159 / 90–99",
            actions: [
              {
                label: "Send Home BP Monitoring",
                badge: "Action",
                body: `Issue the patient with a home blood pressure monitor or arrange ambulatory BP monitoring (ABPM). Ask them to record readings twice daily (morning and evening) for 7 days and return results. Clinic BP: ${sys}/${dia} mmHg.`,
              },
              {
                label: "Add to Hypertension Clinic",
                badge: "Waiting List",
                body: `Add patient to the hypertension clinic waiting list for a full review. Document today's clinic reading of ${sys}/${dia} mmHg in the referral. Ensure home monitoring results are attached once available.`,
              },
            ],
          };
        }

        // ── Home BP
        if (src === "home") {
          // Normal: sys < 135 AND dia < 85
          if (sys < 135 && dia < 85) {
            return {
              theme: "theme-normal",
              icon: "✅",
              title: "Normal Blood Pressure",
              subtitle: "Home Reading · Within Range",
              actions: [
                {
                  label: "No Action Required",
                  badge: "Normal",
                  body: `Home BP of ${sys}/${dia} mmHg is within the normal range (<135/85 mmHg). No immediate action needed. Advise the patient to continue monitoring periodically and maintain a healthy lifestyle.`,
                },
              ],
            };
          }

          // On-call task: sys >= 150 OR dia >= 95
          if (sys >= 150 || dia >= 95) {
            return {
              theme: "theme-oncall",
              icon: "📋",
              title: "Significantly Elevated Home BP",
              subtitle: "Home Reading · GP Review Needed",
              actions: [
                {
                  label: "Task — On-Call GP",
                  badge: "Action Required",
                  body: `Raise a task for the on-call GP. Home BP reading: ${sys}/${dia} mmHg — exceeds the action threshold (≥150/95 mmHg). Patient requires clinical review, medication assessment, and possible initiation or adjustment of antihypertensive therapy.`,
                },
              ],
            };
          }

          // Waitlist band: sys 135–149 OR dia 85–94
          return {
            theme: "theme-monitor",
            icon: "📊",
            title: "Elevated Home BP",
            subtitle: "Home Reading · 135–149 / 85–94",
            actions: [
              {
                label: "Add to Hypertension Clinic",
                badge: "Waiting List",
                body: `Add patient to the hypertension clinic waiting list. Home BP reading of ${sys}/${dia} mmHg falls within the elevated range (135–149 / 85–94 mmHg). Attach the patient's home monitoring log to the referral when available.`,
              },
            ],
          };
        }
      }

      // ─── RENDER RESULT ───────────────────────────────────────────────
      // <div class="action-card-body">${a.body.replace(/\n/g, "<br>")}</div>
      function showResult(sys, dia, src) {
        const r = classify(sys, dia, src);

        const actionsHTML = r.actions
          .map(
            (a) => `
      <div class="action-card">
        <div class="action-card-header">
          <div class="action-card-dot"></div>
          <span class="action-card-label">${a.label}</span>
          <span class="action-card-badge">${a.badge}</span>
        </div>
      </div>
    `,
          )
          .join("");

        resultPanel.className = `result-panel visible ${r.theme}`;
        resultPanel.innerHTML = `
      <div class="result-banner">
        <div class="result-banner-icon">${r.icon}</div>
        <div class="result-banner-text">
          <div class="result-banner-title">${r.title}</div>
          <div class="result-banner-sub">${r.subtitle}</div>
        </div>
      </div>
      <div class="action-cards">${actionsHTML}</div>
    `;

        resultPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    </script>
  </body>
</html>
