services:
  app-dev:
    image: node:22-alpine
    working_dir: /app # Required — node:22-alpine defaults to /
    container_name: shanaim-dev
    restart: "no"
    ports:
      - 3000:5173
    volumes:
      - ".:/app"
      - "node_modules:/app/node_modules"
    environment:
      - NODE_ENV=development
    command: ["npm", "run", "dev", "--", "--host"]

  app:
    image: nginx:alpine
    container_name: shanaim-preview
    restart: "no"
    ports:
      - 8080:80
    volumes:
      - "./dist/:/usr/share/nginx/html"
      - "./nginx.conf:/etc/nginx/conf.d/default.conf"

volumes:
  node_modules:
